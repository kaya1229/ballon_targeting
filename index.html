<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Midnight Cheer: Project TRIANGLE</title>
    <style>
        :root {
            --neo-green: #28FF43;
            --retro-bg: #1a1a1a;
            --wood-desk: #4a2c2a;
        }

        body {
            background-color: #050505;
            color: white;
            font-family: 'Courier New', Courier, monospace;
            overflow: hidden;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            margin: 0;
        }

        /* 게임 보드 (교실 책상 느낌) */
        #game-container {
            position: relative;
            width: 400px;
            height: 600px;
            background: linear-gradient(to bottom, #222, var(--wood-desk));
            border: 10px solid #333;
            border-radius: 20px;
            overflow: hidden;
            box-shadow: 0 0 50px rgba(0,0,0,0.8);
        }

        /* 상단 상태바 */
        #status-bar {
            padding: 15px;
            display: flex;
            justify-content: space-between;
            font-weight: bold;
            text-shadow: 0 0 5px var(--neo-green);
        }

        /* 선생님 감시창 (문 창문 느낌) */
        #teacher-view {
            position: absolute;
            top: 50px;
            left: 50%;
            transform: translateX(-50%);
            width: 120px;
            height: 80px;
            background: #111;
            border: 4px solid #555;
            display: flex;
            justify-content: center;
            align-items: center;
            overflow: hidden;
        }

        #teacher-eye {
            font-size: 40px;
            display: none;
            filter: drop-shadow(0 0 10px red);
        }

        /* PMP (덕질 화면) */
        #pmp-screen {
            position: absolute;
            bottom: 120px;
            left: 50%;
            transform: translateX(-50%);
            width: 280px;
            height: 200px;
            background: #000;
            border: 8px solid #444;
            border-radius: 10px;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            transition: 0.3s;
        }

        /* 은신 시 PMP 숨김 */
        .hidden-pmp {
            transform: translateX(-50%) translateY(250px) !important;
            opacity: 0;
        }

        .triangle-logo {
            width: 0;
            height: 0;
            border-left: 40px solid transparent;
            border-right: 40px solid transparent;
            border-bottom: 70px solid var(--neo-green);
            filter: drop-shadow(0 0 15px var(--neo-green));
            animation: pulse 1s infinite;
        }

        /* 응원 버튼 */
        #cheer-btn {
            position: absolute;
            bottom: 30px;
            left: 30px;
            width: 80px;
            height: 80px;
            background: var(--neo-green);
            border-radius: 50%;
            border: none;
            cursor: pointer;
            font-weight: bold;
            box-shadow: 0 0 20px var(--neo-green);
            z-index: 10;
        }

        /* 은신 버튼 */
        #hide-btn {
            position: absolute;
            bottom: 30px;
            right: 30px;
            width: 80px;
            height: 80px;
            background: #ff4444;
            border-radius: 10px;
            border: none;
            color: white;
            cursor: pointer;
            font-weight: bold;
            z-index: 10;
        }

        @keyframes pulse {
            0% { transform: scale(1); opacity: 0.8; }
            50% { transform: scale(1.1); opacity: 1; }
            100% { transform: scale(1); opacity: 0.8; }
        }

        #warning-light {
            position: absolute;
            top: 0; left: 0; width: 100%; height: 100%;
            background: rgba(255, 0, 0, 0.2);
            display: none;
            pointer-events: none;
        }

        .alert { animation: flash 0.5s infinite; }
        @keyframes flash {
            0%, 100% { opacity: 0; }
            50% { opacity: 1; }
        }
    </style>
</head>
<body>

<div id="game-container">
    <div id="warning-light"></div>
    
    <div id="status-bar">
        <div>SCORE: <span id="score">0</span></div>
        <div>STAMINA: <span id="stamina">100</span>%</div>
    </div>

    <div id="teacher-view">
        <div id="teacher-eye">🕵️‍♂️</div>
        <div id="teacher-msg" style="font-size: 10px; color: #555;">SILENT...</div>
    </div>

    <div id="pmp-screen" class="">
        <div class="triangle-logo"></div>
        <p style="color: var(--neo-green); font-size: 12px; margin-top: 10px;">NOW PLAYING: TRIANGLE</p>
    </div>

    <button id="cheer-btn">TAP!<br>CHEER</button>
    <button id="hide-btn">STUDY<br>(HIDE)</button>
</div>

<script>
    let score = 0;
    let stamina = 100;
    let isHiding = false;
    let isTeacherWatching = false;
    let gameActive = true;

    const scoreEl = document.getElementById('score');
    const staminaEl = document.getElementById('stamina');
    const teacherEye = document.getElementById('teacher-eye');
    const teacherMsg = document.getElementById('teacher-msg');
    const pmpScreen = document.getElementById('pmp-screen');
    const warningLight = document.getElementById('warning-light');

    // 응원하기 버튼
    document.getElementById('cheer-btn').addEventListener('mousedown', () => {
        if (!gameActive || isHiding) return;
        
        if (isTeacherWatching) {
            gameOver("선생님께 걸렸습니다! 야자실 퇴실!");
        } else {
            score += 10;
            scoreEl.innerText = score;
            // 연타 시 시각 효과
            pmpScreen.style.boxShadow = "0 0 30px var(--neo-green)";
            setTimeout(() => pmpScreen.style.boxShadow = "none", 100);
        }
    });

    // 은신하기 버튼 (누르고 있는 동안만 숨음)
    const hideBtn = document.getElementById('hide-btn');
    hideBtn.addEventListener('mousedown', () => {
        isHiding = true;
        pmpScreen.classList.add('hidden-pmp');
    });

    window.addEventListener('mouseup', () => {
        isHiding = false;
        pmpScreen.classList.remove('hidden-pmp');
    });

    // 선생님 감시 로직
    function teacherLoop() {
        if (!gameActive) return;

        // 선생님이 오기 전 경고 (2~4초 무작위)
        let nextCheck = Math.random() * 3000 + 2000;

        setTimeout(() => {
            if (!gameActive) return;
            
            // 경고 상태
            warningLight.style.display = 'block';
            teacherMsg.innerText = "HEARING FOOTSTEPS...";
            teacherMsg.style.color = "red";

            // 1.5초 후 선생님 등장
            setTimeout(() => {
                if (!gameActive) return;
                
                isTeacherWatching = true;
                teacherEye.style.display = 'block';
                teacherMsg.innerText = "WATCHING!!!";
                
                // 선생님이 1~2초간 감시
                setTimeout(() => {
                    isTeacherWatching = false;
                    teacherEye.style.display = 'none';
                    warningLight.style.display = 'none';
                    teacherMsg.innerText = "SILENT...";
                    teacherMsg.style.color = "#555";
                    teacherLoop(); // 다음 루프 시작
                }, Math.random() * 1000 + 1000);

            }, 1500);
        }, nextCheck);
    }

    function gameOver(msg) {
        gameActive = false;
        alert(msg + "\n최종 점수: " + score);
        location.reload();
    }

    // 게임 시작
    teacherLoop();

    // 스테미나 감소 로직 (연타 안하면 조금씩 감소 등 추가 가능)
    setInterval(() => {
        if (gameActive && !isHiding) {
            // 응원 중일 때의 긴장감으로 스테미나 조절 로직 추가 가능
        }
    }, 1000);

</script>
</body>
</html>
