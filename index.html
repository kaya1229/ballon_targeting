<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Resonance: Project TRIANGLE</title>
    <style>
        :root {
            --neo-green: #28FF43;
            --warning-orange: #FFD328;
            --danger-red: #FF4444;
            --desk-wood: #5e3b33;
            --bg-dark: #121212;
        }

        body {
            background-color: #050505;
            color: white;
            font-family: 'Courier New', Courier, monospace;
            overflow: hidden;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            margin: 0;
            user-select: none; /* 드래그 방지 */
        }

        /* 메인 게임 화면 (교실 테마) */
        #game-container {
            position: relative;
            width: 480px;
            height: 700px;
            background-color: var(--bg-dark);
            /* background-image: url('pixel_classroom_bg.png'); */ /* [팁] 여기에 픽셀 배경 이미지 */
            background-size: cover;
            border: 8px solid #333;
            border-radius: 15px;
            box-shadow: 0 0 50px rgba(0,0,0,0.8);
            display: flex;
            flex-direction: column;
        }

        /* --- 상단 UI 영역 --- */
        #ui-header {
            padding: 20px;
            background: rgba(0,0,0,0.5);
            border-bottom: 2px solid #333;
            display: flex;
            justify-content: space-between;
            align-items: center;
        }

        #score-board {
            font-size: 18px;
            font-weight: bold;
            text-shadow: 0 0 5px var(--neo-green);
        }

        /* 데시벨 미터기 */
        #db-container {
            width: 150px;
            height: 20px;
            background: #222;
            border: 2px solid #555;
            position: relative;
            overflow: hidden;
        }

        #db-bar {
            width: 0%;
            height: 100%;
            background: var(--neo-green);
            transition: 0.1s linear;
            box-shadow: 0 0 10px var(--neo-green);
        }

        /* --- 교실 (책상 격자) 영역 --- */
        #classroom-grid {
            flex: 1;
            display: grid;
            grid-template-columns: repeat(3, 1fr);
            grid-template-rows: repeat(3, 1fr);
            gap: 15px;
            padding: 20px;
            justify-items: center;
            align-items: center;
        }

        /* 각 책상 슬롯 */
        .desk-slot {
            position: relative;
            width: 110px;
            height: 110px;
            display: flex;
            justify-content: center;
            align-items: center;
        }

        /* 학생 캐릭터 스타일 (픽셀 이미지로 대체 가능) */
        .student {
            width: 80px;
            height: 80px;
            background-color: #444; /* 공부 중일 때 색 */
            border-radius: 10px;
            border: 4px solid #222;
            position: relative;
            transition: 0.2s;
            display: flex;
            justify-content: center;
            align-items: center;
            font-size: 10px;
        }

        /* 책상 (캐릭터 앞에 배치) */
        .desk-front {
            position: absolute;
            bottom: 0;
            width: 100%;
            height: 30px;
            background-color: var(--desk-wood);
            border: 2px solid #333;
            border-radius: 5px;
            z-index: 2;
        }

        /* 주인공 표시 */
        .is-hero {
            border-color: var(--warning-orange);
            box-shadow: 0 0 10px var(--warning-orange);
        }
        
        .hero-tag {
            position: absolute;
            top: -15px;
            font-size: 10px;
            color: var(--warning-orange);
            font-weight: bold;
        }

        /* --- 상태별 애니메이션 --- */
        
        /* 응원 중 상태 */
        .cheering {
            background-color: #222;
            border-color: var(--neo-green);
            box-shadow: 0 0 15px var(--neo-green);
            animation: vibrate 0.1s infinite;
        }
        
        .cheering::after {
            content: '▲'; /* 풍선/응원 아이콘 */
            font-size: 30px;
            color: var(--neo-green);
            filter: drop-shadow(0 0 5px var(--neo-green));
        }

        @keyframes vibrate {
            0% { transform: translate(1px, 1px); }
            50% { transform: translate(-1px, -1px); }
            100% { transform: translate(1px, -1px); }
        }

        /* --- 하단 컨트롤 버튼 영역 --- */
        #controls {
            padding: 20px;
            display: flex;
            justify-content: space-around;
            border-top: 2px solid #333;
            background: rgba(0,0,0,0.5);
        }

        .btn {
            width: 120px;
            height: 50px;
            font-family: inherit;
            font-weight: bold;
            font-size: 16px;
            border: none;
            border-radius: 5px;
            cursor: pointer;
            transition: 0.1s;
        }
        
        .btn:active { transform: scale(0.95); }

        #btn-cheer {
            background-color: var(--neo-green);
            color: black;
            box-shadow: 0 0 15px var(--neo-green);
        }

        #btn-study {
            background-color: #444;
            color: white;
            border: 2px solid #555;
        }
        
        /* 선택된 버튼 강조 */
        .active-mode {
            outline: 4px solid white;
            outline-offset: 2px;
        }

        /* 선생님 감시 오버레이 */
        #teacher-overlay {
            position: absolute;
            top: 0; left: 0; width: 100%; height: 100%;
            background: rgba(255, 0, 0, 0.4);
            display: none;
            justify-content: center;
            align-items: center;
            z-index: 100;
            animation: flash 0.3s infinite;
        }
        @keyframes flash { 0%, 100% {opacity: 1;} 50% {opacity: 0.5;} }

    </style>
</head>
<body>

<div id="game-container">
    <div id="teacher-overlay"><h1>TEACHER INSIDE!</h1></div>

    <div id="ui-header">
        <div id="score-board">SCORE: <span id="score">0</span></div>
        <div style="text-align: right;">
            <div style="font-size: 10px; color: #aaa; margin-bottom: 2px;">교실 dB</div>
            <div id="db-container">
                <div id="db-bar"></div>
            </div>
        </div>
    </div>

    <div id="classroom-grid">
        <script>
            for(let i=0; i<9; i++) {
                const isHero = i === 4;
                document.write(`
                    <div class="desk-slot">
                        <div id="student-${i}" class="student ${isHero ? 'is-hero' : ''}">
                            ${isHero ? '<span class="hero-tag">YOU</span>' : ''}
                        </div>
                        <div class="desk-front"></div>
                    </div>
                `);
            }
        </script>
    </div>

    <div id="controls">
        <button id="btn-study" class="btn active-mode">공부하기<br>(dB 줄이기)</button>
        <button id="btn-cheer" class="btn">응원하기<br>(전염시키기)</button>
    </div>
</div>

<script>
    // --- 게임 데이터 및 상태 ---
    let score = 0;
    let dbLevel = 0;
    const MAX_DB = 100;
    const GAME_DURATION = 60; // 게임 시간 (초, 예: 노래 길이)
    let timeLeft = GAME_DURATION;
    let gameActive = true;

    // 책상 상태 배열 (0: 공부, 1: 응원)
    let deskStates = [0, 0, 0, 0, 0, 0, 0, 0, 0];
    const HERO_INDEX = 4; // 주인공 위치 (중앙)

    // DOM 요소
    const scoreEl = document.getElementById('score');
    const dbBarEl = document.getElementById('db-bar');
    const btnCheer = document.getElementById('btn-cheer');
    const btnStudy = document.getElementById('btn-study');
    const teacherOverlay = document.getElementById('teacher-overlay');

    // --- 컨트롤러 로직 ---

    // 응원하기 모드 전환
    btnCheer.addEventListener('click', () => {
        if (!gameActive) return;
        deskStates[HERO_INDEX] = 1; // 주인공 응원 시작
        btnCheer.classList.add('active-mode');
        btnStudy.classList.remove('active-mode');
        updateVisuals();
    });

    // 공부하기 모드 전환
    btnStudy.addEventListener('click', () => {
        if (!gameActive) return;
        deskStates[HERO_INDEX] = 0; // 주인공 공부 시작
        btnStudy.classList.add('active-mode');
        btnCheer.classList.remove('active-mode');
        updateVisuals();
    });

    // --- 핵심 게임 로직 루프 (1초마다 실행) ---
    const gameLoop = setInterval(() => {
        if (!gameActive) return;

        timeLeft--;
        const cheeringCount = deskStates.filter(state => state === 1).length;

        // 1. 점수 산정 (응원 인원이 많을수록 폭발적 상승, High Risk High Return)
        // 공식: 인원수의 제곱 * 10
        score += cheeringCount * cheeringCount * 10;
        scoreEl.innerText = score.toLocaleString();

        // 2. dB 및 전염 로직 (주인공 상태에 따라 달라짐)
        
        if (deskStates[HERO_INDEX] === 1) { 
            // --- [주인공 응원 중] ---
            
            // dB 상승 (인원수에 비례)
            dbLevel = Math.min(MAX_DB, dbLevel + cheeringCount * 1.5);

            // 열기 확산 (전염): 30% 확률로 인접한 무작위 친구 전염
            if (Math.random() < 0.3 && cheeringCount < 9) {
                spreadCheer();
            }
        } else {
            // --- [주인공 공부 중] ---
            
            // dB 자연 감소
            dbLevel = Math.max(0, dbLevel - 4);

            // 열기 식히기: 50% 확률로 가장 나중에 응원한 친구부터 공부 시작
            if (Math.random() < 0.5 && cheeringCount > 0) {
                stopCheerOne();
            }
        }

        updateDBMeter();
        updateVisuals();
        checkGameOver();

        if (timeLeft <= 0) {
            endGame("노래 끝! 응원 성공!", true);
        }
    }, 1000);

    // --- 유틸리티 함수들 ---

    // 무작위 친구 한 명 전염 (주인공과 가까운 인덱스 선호 로직 추가 가능)
    function spreadCheer() {
        let potentialFriends = [];
        deskStates.forEach((state, index) => {
            if (state === 0 && index !== HERO_INDEX) potentialFriends.push(index);
        });
        
        if (potentialFriends.length > 0) {
            const victim = potentialFriends[Math.floor(Math.random() * potentialFriends.length)];
            deskStates[victim] = 1;
        }
    }

    // 무작위 친구 한 명 응원 중단
    function stopCheerOne() {
        let cheeringFriends = [];
        deskStates.forEach((state, index) => {
            if (state === 1 && index !== HERO_INDEX) cheeringFriends.push(index);
        });

        if (cheeringFriends.length > 0) {
            const friend = cheeringFriends[Math.floor(Math.random() * cheeringFriends.length)];
            deskStates[friend] = 0;
        }
    }

    // dB 미터기 및 선생님 주의력 연출 업데이트
    function updateDBMeter() {
        dbBarEl.style.width = `${dbLevel}%`;
        
        // dB 수준에 따른 색상 변경
        if (dbLevel > 80) {
            dbBarEl.style.backgroundColor = 'var(--danger-red)';
            dbBarEl.style.boxShadow = '0 0 15px var(--danger-red)';
            // 들키기 직전 경고 깜빡임 연출
            document.getElementById('db-container').style.animation = 'flash 0.2s infinite';
        } else if (dbLevel > 50) {
            dbBarEl.style.backgroundColor = 'var(--warning-orange)';
            dbBarEl.style.boxShadow = '0 0 10px var(--warning-orange)';
            document.getElementById('db-container').style.animation = 'none';
        } else {
            dbBarEl.style.backgroundColor = 'var(--neo-green)';
            dbBarEl.style.boxShadow = '0 0 10px var(--neo-green)';
            document.getElementById('db-container').style.animation = 'none';
        }
    }

    // 학생 캐릭터들의 시각적 상태 업데이트
    function updateVisuals() {
        deskStates.forEach((state, index) => {
            const studentEl = document.getElementById(`student-${index}`);
            if (state === 1) {
                studentEl.classList.add('cheering');
            } else {
                studentEl.classList.remove('cheering');
            }
        });
    }

    // 선생님 급습 및 게임 오버 체크
    function checkGameOver() {
        // dB가 90을 넘으면 선생님이 급습할 확률이 매우 높아짐
        if (dbLevel >= 90) {
            gameActive = false;
            teacherOverlay.style.display = 'flex';
            
            // 0.5초 후 최종 판정 (이 찰나의 순간에 공부 버튼을 누르면 살 수도 있음)
            setTimeout(() => {
                const cheeringCount = deskStates.filter(state => state === 1).length;
                if (cheeringCount > 0) {
                    endGame("선생님께 들켰습니다! 트라이앵글 로고를 압수당했습니다.", false);
                } else {
                    // 기적적으로 다 공부 중이면 선생님이 투덜대며 나감
                    teacherOverlay.style.display = 'none';
                    gameActive = true;
                    dbLevel = 50; // dB 반으로 줄여줌
                    teacherLoop(); 
                }
            }, 500);
        }
    }

    function endGame(msg, success) {
        gameActive = false;
        clearInterval(gameLoop);
        teacherOverlay.style.display = 'none';
        
        // 최종 등급 산정 (랭킹전 UI 대용)
        let rank = "F (일반 학생)";
        if (success) {
            if (score > 10000) rank = "S (열혈 가디언)";
            else if (score > 5000) rank = "A (우등생 팬)";
            else if (score > 2000) rank = "B (초보 팬)";
        }

        alert(`${msg}\n\n최종 점수: ${score.toLocaleString()}\n당신의 서열: ${rank}`);
        location.reload();
    }

</script>
</body>
</html>
