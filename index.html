<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>풍선 팡팡! 사진 찾기</title>
    <style>
        :root {
            --bg-color: #e0e7ff;
            --red: #ff5e57;
            --green: #1dd1a1;
            --blue: #54a0ff;
        }

        body {
            margin: 0;
            font-family: 'Pretendard', sans-serif;
            background-color: var(--bg-color);
            display: flex;
            flex-direction: column;
            align-items: center;
            overflow: hidden;
            user-select: none;
            height: 100vh;
        }

        /* 상단 UI */
        #ui-layer {
            width: 100%;
            padding: 15px;
            display: flex;
            justify-content: space-around;
            background: white;
            box-shadow: 0 4px 15px rgba(0,0,0,0.1);
            z-index: 100;
        }

        .stat { font-size: 1.2rem; font-weight: 800; color: #333; }
        #timer.warning { color: #ff3f34; animation: shake 0.2s infinite; }

        /* 게임 필드 */
        #game-board {
            position: relative;
            width: 95vw;
            height: 80vh;
            margin-top: 15px;
            background: #fff;
            border-radius: 20px;
            overflow: hidden;
            border: 8px solid #c7d2fe;
            box-shadow: inset 0 0 20px rgba(0,0,0,0.05);
        }

        /* 사진 (바닥) */
        .photo {
            position: absolute;
            width: 85px;
            height: 85px;
            background-size: cover;
            background-position: center;
            border-radius: 12px;
            cursor: pointer;
            z-index: 1;
            border: 3px solid transparent;
            transition: transform 0.2s;
        }
        .photo:active { transform: scale(0.9); }

        /* 풍선 (상단) */
        .balloon {
            position: absolute;
            width: 65px;
            height: 80px;
            border-radius: 50% 50% 50% 50% / 45% 45% 55% 55%;
            cursor: pointer;
            z-index: 10;
            box-shadow: inset -8px -10px 15px rgba(0,0,0,0.1), 0 10px 15px rgba(0,0,0,0.1);
            display: flex;
            justify-content: center;
        }

        .balloon::before { /* 광택 */
            content: '';
            position: absolute;
            top: 15%; left: 20%;
            width: 15px; height: 25px;
            background: rgba(255, 255, 255, 0.4);
            border-radius: 50%;
            transform: rotate(20deg);
        }

        .balloon::after { /* 매듭 */
            content: '';
            position: absolute;
            bottom: -8px;
            width: 10px; height: 10px;
            clip-path: polygon(50% 0%, 0% 100%, 100% 100%);
        }

        .red { background: radial-gradient(circle at 30% 30%, #ff7675, #d63031); }
        .red::after { background: #d63031; }
        .green { background: radial-gradient(circle at 30% 30%, #55efc4, #00b894); }
        .green::after { background: #00b894; }
        .blue { background: radial-gradient(circle at 30% 30%, #74b9ff, #0984e3); }
        .blue::after { background: #0984e3; }

        /* 파티클 이펙트 */
        .particle {
            position: absolute;
            width: 8px;
            height: 8px;
            border-radius: 50%;
            pointer-events: none;
            z-index: 15;
        }

        @keyframes particle-fade {
            to { transform: translate(var(--x), var(--y)) scale(0); opacity: 0; }
        }

        /* 패널티 깜빡임 */
        .flash-red { animation: flash 0.3s; }
        @keyframes flash {
            0%, 100% { background-color: #fff; }
            50% { background-color: rgba(255, 77, 77, 0.4); }
        }

        /* 결과창 */
        #result-modal {
            display: none;
            position: fixed;
            top: 50%; left: 50%;
            transform: translate(-50%, -50%);
            background: white;
            padding: 40px;
            border-radius: 25px;
            text-align: center;
            box-shadow: 0 10px 40px rgba(0,0,0,0.3);
            z-index: 200;
            width: 300px;
        }

        button {
            background: #4a69bd;
            color: white;
            border: none;
            padding: 12px 25px;
            border-radius: 10px;
            font-size: 1rem;
            font-weight: bold;
            cursor: pointer;
            margin-top: 15px;
        }
    </style>
</head>
<body>

    <div id="ui-layer">
        <div class="stat">⏰ <span id="time-val">60</span>s</div>
        <div class="stat">📸 <span id="score-val">0</span> / 3</div>
    </div>

    <div id="game-board"></div>

    <div id="result-modal">
        <h1 id="result-title">결과</h1>
        <p id="result-msg"></p>
        <button onclick="location.reload()">다시 도전!</button>
    </div>

    <script>
        const TARGET_COUNT = 3;
        const DECOY_COUNT = 10;
        const BALLOON_COUNT = 130;
        let timeLeft = 60;
        let score = 0;
        let gameActive = true;

        // ** 파일명을 본인이 업로드한 사진으로 꼭 바꾸세요! **
        const TARGET_IMAGES = ['target1.jpg', 'target2.jpg', 'target3.jpg'];
        const DECOY_IMAGES = ['decoy1.jpg', 'decoy2.jpg', 'decoy3.jpg', 'decoy4.jpg'];

        const board = document.getElementById('game-board');
        const timeDisplay = document.getElementById('time-val');
        const scoreDisplay = document.getElementById('score-val');

        function initGame() {
            createItems(TARGET_IMAGES, 'target', TARGET_COUNT);
            createItems(DECOY_IMAGES, 'decoy', DECOY_COUNT);

            for (let i = 0; i < BALLOON_COUNT; i++) {
                createBalloon();
            }

            const timerInterval = setInterval(() => {
                if (!gameActive) { clearInterval(timerInterval); return; }
                timeLeft--;
                timeDisplay.innerText = timeLeft;
                if (timeLeft <= 0) endGame(false);
            }, 1000);
        }

        function createItems(imgArray, type, count) {
            for (let i = 0; i < count; i++) {
                const img = document.createElement('div');
                img.className = 'photo';
                img.dataset.type = type;
                img.style.backgroundImage = `url('${imgArray[i % imgArray.length]}')`;
                
                img.style.left = Math.random() * (board.clientWidth - 90) + 'px';
                img.style.top = Math.random() * (board.clientHeight - 90) + 'px';

                img.addEventListener('click', (e) => {
                    if (!gameActive) return;
                    if (type === 'target') {
                        if (img.style.opacity === '0.4') return;
                        score++;
                        scoreDisplay.innerText = score;
                        img.style.opacity = '0.4';
                        img.style.border = '4px solid #fbc531';
                        if (score === TARGET_COUNT) endGame(true);
                    } else {
                        applyPenalty();
                    }
                });
                board.appendChild(img);
            }
        }

        function createBalloon() {
            const b = document.createElement('div');
            const colorKeys = ['red', 'green', 'blue'];
            const colorClass = colorKeys[Math.floor(Math.random() * 3)];
            b.className = `balloon ${colorClass}`;

            b.style.left = Math.random() * (board.clientWidth - 70) + 'px';
            b.style.top = Math.random() * (board.clientHeight - 90) + 'px';

            b.addEventListener('mousedown', (e) => {
                if (!gameActive) return;
                createBurst(e.clientX, e.clientY, colorClass);
                b.remove();
            });
            board.appendChild(b);
        }

        // 터지는 파티클 효과 함수
        function createBurst(x, y, colorClass) {
            const colorMap = { 'red': '#ff4d4d', 'green': '#2ecc71', 'blue': '#3498db' };
            const boardRect = board.getBoundingClientRect();
            
            for (let i = 0; i < 8; i++) {
                const p = document.createElement('div');
                p.className = 'particle';
                p.style.backgroundColor = colorMap[colorClass];
                
                // 마우스 클릭 위치를 게임 보드 내부 좌표로 변환
                p.style.left = (x - boardRect.left) + 'px';
                p.style.top = (y - boardRect.top) + 'px';

                // 랜덤 파편 방향
                const angle = Math.random() * Math.PI * 2;
                const dist = 50 + Math.random() * 50;
                p.style.setProperty('--x', Math.cos(angle) * dist + 'px');
                p.style.setProperty('--y', Math.sin(angle) * dist + 'px');

                p.style.animation = 'particle-fade 0.4s ease-out forwards';
                board.appendChild(p);
                setTimeout(() => p.remove(), 400);
            }
        }

        function applyPenalty() {
            timeLeft = Math.max(0, timeLeft - 5);
            timeDisplay.innerText = timeLeft;
            board.classList.add('flash-red');
            setTimeout(() => board.classList.remove('flash-red'), 300);
        }

        function endGame(isWin) {
            gameActive = false;
            const modal = document.getElementById('result-modal');
            modal.style.display = 'block';
            document.getElementById('result-title').innerText = isWin ? "🎉 클리어!" : "❌ 게임 오버";
            document.getElementById('result-msg').innerText = isWin ? 
                `남은 시간 ${timeLeft}초! 대단해요!` : "시간이 부족했어요. 다시 해볼까요?";
        }

        window.onload = initGame;
    </script>
</body>
</html>
